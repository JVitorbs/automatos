{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Validador RegEx{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <header class="shell header-shell">
        <a class="brand" href="{% url 'index' %}">Validador RegEx</a>
        <nav class="top-nav">
            <a href="{% url 'index' %}">Validar</a>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'history' %}">Historico</a>
            <a href="{% url 'export' %}">Exportacao</a>
        </nav>
    </header>

    <main class="shell">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
